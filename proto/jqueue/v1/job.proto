syntax = "proto3";

package jqueue.v1;
option go_package = "github.com/pravinkanna/jQueue/gen/go/jqueue/v1;jqueuev1";

import "google/protobuf/timestamp.proto";


enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_SCHEDULED = 1;
  JOB_STATE_PENDING = 2;
  JOB_STATE_LEASED = 3;
  JOB_STATE_COMPLETED = 4;
  JOB_STATE_FAILED = 5;
  JOB_STATE_DLQ = 6;
  JOB_STATE_CANCELLED = 7;
}

message Job {
  string job_id = 1;
  string idempotency_key = 2;
  string queue = 3;
  bytes payload = 4;
  JobState state = 5;
  uint32 max_attempts = 6;
  uint32 attempt_count = 7;
  string last_error = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp scheduled_at = 10;
  google.protobuf.Timestamp completed_at = 11;
}